{% extends "base.html" %}
{% block title %}Cadastro — Cabeleleila Leila{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="container">
        <div class="row justify-content-center align-items-center min-vh-100">
            <div class="col-md-5 col-lg-4">
                <div class="card card-glass auth-card animate-fade-in">
                    <div class="card-body p-4 p-md-5">
                        <!-- Logo -->
                        <div class="text-center mb-4">
                            <div class="auth-icon-wrap mb-3">
                                <i class="bi bi-person-plus-fill"></i>
                            </div>
                            <h1 class="h3 fw-bold gradient-text">Criar Conta</h1>
                            <p class="text-muted small">Cadastre-se para agendar seus serviços</p>
                        </div>

                        <!-- Formulário -->
                        <form id="registerForm" novalidate>
                            <div class="form-floating mb-3">
                                <input type="text" class="form-control input-glass" id="regName"
                                       placeholder="Seu Nome" required>
                                <label for="regName"><i class="bi bi-person me-1"></i>Nome completo</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="email" class="form-control input-glass" id="regEmail"
                                       placeholder="email@exemplo.com" required>
                                <label for="regEmail"><i class="bi bi-envelope me-1"></i>Email</label>
                            </div>

                            <div class="form-floating mb-3">
                                <input type="tel" class="form-control input-glass" id="regPhone"
                                       placeholder="(11) 99999-9999">
                                <label for="regPhone"><i class="bi bi-phone me-1"></i>Telefone</label>
                            </div>

                            <div class="form-floating mb-4">
                                <input type="password" class="form-control input-glass" id="regPassword"
                                       placeholder="Senha" required minlength="6">
                                <label for="regPassword"><i class="bi bi-lock me-1"></i>Senha</label>
                            </div>

                            <div id="registerError" class="alert alert-danger d-none small py-2"></div>

                            <button type="submit" class="btn btn-primary-gradient w-100 btn-lg mb-3" id="registerBtn">
                                <span class="btn-text">Criar Conta</span>
                                <span class="spinner-border spinner-border-sm d-none" role="status"></span>
                            </button>
                            
                            <div class="d-flex align-items-center mb-3">
                                <hr class="flex-grow-1 border-secondary">
                                <span class="mx-2 text-muted small">ou</span>
                                <hr class="flex-grow-1 border-secondary">
                            </div>

                            <a href="/api/auth/google/login" class="btn btn-outline-light w-100 mb-2">
                                <i class="bi bi-google me-2"></i>Criar Conta com Google
                            </a>
                        </form>

                        <div class="text-center">
                            <p class="text-muted small mb-0">
                                Já tem conta?
                                <a href="/login" class="text-decoration-none gradient-text fw-semibold">
                                    Fazer login
                                </a>
                            </p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('registerForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('registerBtn');
    const errorDiv = document.getElementById('registerError');
    errorDiv.classList.add('d-none');

    btn.querySelector('.btn-text').textContent = 'Criando conta...';
    btn.querySelector('.spinner-border').classList.remove('d-none');
    btn.disabled = true;

    try {
        const res = await fetch('/api/auth/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                nome: document.getElementById('regName').value,
                email: document.getElementById('regEmail').value,
                telefone: document.getElementById('regPhone').value || null,
                senha: document.getElementById('regPassword').value
            })
        });

        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.detail || 'Erro ao criar conta');
        }

        localStorage.setItem('access_token', data.access_token);
        localStorage.setItem('user', JSON.stringify(data.user));
        document.cookie = `access_token=${data.access_token}; path=/; max-age=3600`;

        window.location.href = '/client/dashboard';
    } catch (err) {
        errorDiv.textContent = err.message;
        errorDiv.classList.remove('d-none');
    } finally {
        btn.querySelector('.btn-text').textContent = 'Criar Conta';
        btn.querySelector('.spinner-border').classList.add('d-none');
        btn.disabled = false;
    }
});
</script>
{% endblock %}
