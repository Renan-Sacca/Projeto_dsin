{% extends "base.html" %}
{% block title %}Redefinir Senha — Cabeleleila Leila{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card card-glass animate-fade-in">
                <div class="card-body p-4 p-md-5">
                    <div class="text-center mb-4">
                        <h2 class="fw-bold gradient-text">Nova Senha</h2>
                        <p class="text-muted">Crie uma senha forte para sua conta.</p>
                    </div>

                    <form id="resetPasswordForm">
                        <div class="mb-3">
                            <label class="form-label">Nova Senha</label>
                            <input type="password" class="form-control input-glass" id="password" required minlength="6" placeholder="••••••">
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control input-glass" id="confirmPassword" required minlength="6" placeholder="••••••">
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary-gradient py-2 fw-bold" id="submitBtn">
                                <span class="btn-text">Redefinir Senha</span>
                                <span class="spinner-border spinner-border-sm d-none"></span>
                            </button>
                        </div>
                    </form>

                    <div id="successMessage" class="mt-4 text-center d-none">
                        <div class="stat-icon bg-success-subtle text-success mx-auto mb-3">
                            <i class="bi bi-shield-check"></i>
                        </div>
                        <h5 class="text-success fw-bold">Tudo pronto!</h5>
                        <p class="text-muted small">Sua senha foi redefinida com sucesso.</p>
                        <a href="/login" class="btn btn-primary-gradient w-100 mt-3">Ir para Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const password = document.getElementById('password').value;
    const confirm = document.getElementById('confirmPassword').value;

    if (password !== confirm) {
        showToast('As senhas não coincidem.', 'warning');
        return;
    }

    // Pega o token da URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (!token) {
        showToast('Token de recuperação não encontrado.', 'danger');
        return;
    }

    const btn = document.getElementById('submitBtn');
    const form = e.target;
    
    btn.disabled = true;
    btn.querySelector('.btn-text').textContent = 'Processando...';
    btn.querySelector('.spinner-border').classList.remove('d-none');

    try {
        await apiPost('/api/auth/reset-password', {
            token: token,
            nova_senha: password
        });
        form.classList.add('d-none');
        document.getElementById('successMessage').classList.remove('d-none');
    } catch (err) {
        showToast(err.message, 'danger');
        btn.disabled = false;
        btn.querySelector('.btn-text').textContent = 'Redefinir Senha';
        btn.querySelector('.spinner-border').classList.add('d-none');
    }
});
</script>
{% endblock %}
